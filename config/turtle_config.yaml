# 跨市场ETF海龟组合策略 · 参数配置 (V3.0)
# 对应设计文档: docs/strategy_design_v3.0.md
# 注意：参数值必须与设计文档一致，修改时同步更新设计文档

# ── 资金 ──
initial_cash: 120000          # 初始资金，单位：元（V5.12 从 20万 调整，资金利用率 42%）
commission_pct: 0.00015       # 佣金：万1.5 (双边)
slippage_pct: 0.001           # 滑点：0.1% (双边)

# ── 海龟参数 ──
turtle:
  breakout_period: 20         # 20日突破入场
  atr_period: 20              # ATR计算周期 (指数平滑平均)
  stop_period: 10             # 10日反向突破止损
  stop_atr_multiple: 2.0      # 2N绝对止损
  risk_per_unit: 0.01         # 每单位占用1%账户风险
  max_units: 4                # 最多4个单位
  unit_step: 0.5              # 每0.5N加仓一次
  use_55_filter: false        # 默认不使用55日过滤
  exit_period: 10             # 10日反向突破退出

# ── 三层权重配置 ──
weighting:
  alpha: 0.05                # α风险平价偏移系数 (0=纯ATR, 1=纯风险平价)
  cov_lookback_days: 252    # 协方差矩阵估计窗口 (约12个月交易日)
  rebalance_quarterly: true  # 每季度全组合再平衡
  atr_change_threshold: 0.30 # ATR变动超过30%触发强制再平衡

# ── 交易标的 (4只ETF) ──
symbols:
  - code: "510500.SH"   # 中证500ETF
    name: "中证500"
    market: "A股"
    shortable: false
    t_plus_one: true
  - code: "159915.SZ"   # 创业板ETF
    name: "创业板"
    market: "A股"
    shortable: false
    t_plus_one: true
  - code: "513100.SH"   # 纳指ETF
    name: "纳指ETF"
    market: "跨境"
    shortable: true
    t_plus_one: false
  - code: "518880.SH"   # 黄金ETF
    name: "黄金ETF"
    market: "商品"
    shortable: true
    t_plus_one: false

# ── 国债ETF (空仓期现金管理) ──
bond:
  code: "511010.SH"
  name: "国债ETF"
  annual_return: 0.025       # 年化收益率 2.5%

# ── 期货配置 ──
futures:
  initial_cash: 1000000      # 初始资金，单位：元（期货需更大资金）
  margin_rate: 0.15          # 保证金比例 15%（约 6.67x 杠杆）
  start_date: "2015-01-01"
  end_date: "2026-06-10"

# ── 回测区间（ETF） ──
backtest:
  start_date: "2020-01-01"
  end_date: "2026-06-10"

# ── 风控参数 ──
risk:
  max_portfolio_risk: 0.20       # 组合总风险敞口 ≤ 20%
  single_max_risk: 0.04          # 单品种最大风险 ≤ 4%
  concentration_trigger: 3       # ≥3品种同时持仓时降敞口
  concentrated_risk_per_unit: 0.005  # 集中度熔断后单单位风险
  max_consecutive_losses: 8      # 连续亏损8次暂停交易
  max_cumulative_loss_pct: 0.15  # 累计亏损15%暂停交易
  pause_days: 5                  # 暂停交易天数
  correlation_warning: 0.6       # 60日滚动平均相关系数预警阈值
  correlation_lookback: 60       # 滚动相关性计算窗口

  # ── 品种退化自动检测（三规则，仅报警不自动暂停） ──
  degradation:
    silent_annual_signals: 2.0       # 规则①：年均信号 < 此值 → 沉默型退化
    intercept_min_signals: 5         # 规则②：最少信号数门槛
    intercept_max_conv_pct: 0.30     # 规则②：入场/信号 ≤ 此值 → 拦截型退化
    wear_min_trades: 3               # 规则③：最少交易数门槛
    wear_max_loss_streak: 3          # 规则③：连亏 ≥ 此值 且 亏损额>5%
    wear_min_loss_amount_pct: 0.05   # 规则③：近N笔亏损总额 > 初始资金 × 此值
