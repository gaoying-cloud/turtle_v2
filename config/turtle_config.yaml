# 跨市场ETF海龟组合策略 · 参数配置 (V3.0)
# 对应设计文档: docs/strategy_design_v3.0.md
# 注意：参数值必须与设计文档一致，修改时同步更新设计文档

# ── 资金 ──
initial_cash: 120000          # 初始资金，单位：元（V5.12 从 20万 调整，资金利用率 42%）
commission_pct: 0.00015       # 佣金：万1.5 (双边)
slippage_pct: 0.001           # 滑点：0.1% (双边)

# ── 海龟参数 ──
turtle:
  breakout_period: 20         # 20日突破入场
  atr_period: 20              # ATR计算周期 (指数平滑平均)
  stop_period: 10             # 10日反向突破止损
  stop_atr_multiple: 2.0      # 2N绝对止损
  risk_per_unit: 0.01         # 每单位占用1%账户风险
  max_units: 4                # 最多4个单位
  unit_step: 0.5              # 每0.5N加仓一次
  use_55_filter: false        # 默认不使用55日过滤
  # ── 市场状态前置过滤（降回撤） ──
  regime_filter: "off"         # "off" | "choppy_only" | "trending_only"
  choppy_threshold: 0.35       # choppy 判定阈值（< 此值=碎步市）
  use_trend_duration_filter: false  # 趋势持续时间过滤
  trend_duration_min_days: 5   # 趋势持续中位数最低天数
  exit_period: 10             # 10日反向突破退出

# ── 三层权重配置 ──
weighting:
  alpha: 0.05                # α风险平价偏移系数 (0=纯ATR, 1=纯风险平价)
  cov_lookback_days: 252    # 协方差矩阵估计窗口 (约12个月交易日)
  rebalance_quarterly: true  # 每季度全组合再平衡
  atr_change_threshold: 0.30 # ATR变动超过30%触发强制再平衡

# ── 交易标的 (4只ETF) ──
symbols:
  - code: "510500.SH"   # 中证500ETF
    name: "中证500"
    market: "A股"
    shortable: false
    t_plus_one: true
  - code: "159915.SZ"   # 创业板ETF
    name: "创业板"
    market: "A股"
    shortable: false
    t_plus_one: true
  - code: "513100.SH"   # 纳指ETF
    name: "纳指ETF"
    market: "跨境"
    shortable: false
    t_plus_one: false
  - code: "518880.SH"   # 黄金ETF
    name: "黄金ETF"
    market: "商品"
    shortable: false
    t_plus_one: false

# ── 国债ETF (空仓期现金管理) ──
bond:
  code: "511010.SH"
  name: "国债ETF"
  annual_return: 0.025       # 年化收益率 2.5%

# ── 期货配置 ──
futures:
  initial_cash: 1000000      # 初始资金，单位：元（期货需更大资金）
  margin_rate: 0.15          # 保证金比例 15%（约 6.67x 杠杆）
  start_date: "2015-01-01"
  end_date: "2026-06-10"
  # 期货品种列表（统一来源，pull_futures/run_backtest/config_loader 均从此读取）
  # 字段命名沿用 Tushare 术语 ts_code，便于 pull_futures.py 直接使用
  futures_list:
    - ts_code: "CU.SHF"
      name: "沪铜"
      exchange: "上期所"
      category: "金属"
      multiplier: 5
    - ts_code: "RB.SHF"
      name: "螺纹钢"
      exchange: "上期所"
      category: "金属"
      multiplier: 10
    - ts_code: "RU.SHF"
      name: "橡胶"
      exchange: "上期所"
      category: "能源化工"
      multiplier: 10
    - ts_code: "M.DCE"
      name: "豆粕"
      exchange: "大商所"
      category: "农产品"
      multiplier: 10
    - ts_code: "Y.DCE"
      name: "豆油"
      exchange: "大商所"
      category: "农产品"
      multiplier: 10
    - ts_code: "P.DCE"
      name: "棕榈油"
      exchange: "大商所"
      category: "农产品"
      multiplier: 10
    - ts_code: "JM.DCE"
      name: "焦煤"
      exchange: "大商所"
      category: "能源"
      multiplier: 60
    - ts_code: "CF.ZCE"
      name: "棉花"
      exchange: "郑商所"
      category: "农产品"
      multiplier: 5
    - ts_code: "SR.ZCE"
      name: "白糖"
      exchange: "郑商所"
      category: "农产品"
      multiplier: 10
    - ts_code: "TA.ZCE"
      name: "PTA"
      exchange: "郑商所"
      category: "能源化工"
      multiplier: 5
    - ts_code: "I.DCE"
      name: "铁矿石"
      exchange: "大商所"
      category: "黑色"
      multiplier: 100
    - ts_code: "SC.INE"
      name: "原油"
      exchange: "能源中心"
      category: "能源"
      multiplier: 1000

# ── 回测区间（ETF） ──
backtest:
  start_date: "2020-01-01"
  end_date: "2026-06-10"

# ── 风控参数 ──
risk:
  max_portfolio_risk: 0.20       # 组合总风险敞口 ≤ 20%
  single_max_risk: 0.04          # 单品种最大风险 ≤ 4%
  concentration_trigger: 3       # ≥3品种同时持仓时降敞口
  concentrated_risk_per_unit: 0.005  # 集中度熔断后单单位风险
  max_consecutive_losses: 8      # 连续亏损8次暂停交易
  max_cumulative_loss_pct: 0.15  # 累计亏损15%暂停交易
  pause_days: 5                  # 暂停交易天数
  correlation_warning: 0.6       # 60日滚动平均相关系数预警阈值
  correlation_lookback: 60       # 滚动相关性计算窗口

  # ── 品种退化自动检测（三规则，仅报警不自动暂停） ──
  # 触发时序：规则②最早（几周）→ 规则③（数月）→ 规则①（一年以上）
  degradation:
    silent_annual_signals: 2          # 规则①：年均信号 < 此值 → 沉默型退化
    entry_conv_min: 0.30              # 规则②：入场/信号 ≤ 此值 → 拦截型退化
    entry_conv_min_signals: 10        # 规则②：至少 N 个信号才判定
    wear_window_short: 3              # 规则③：近 N 笔全亏
    wear_window_long: 6               # 规则③：近 N 笔胜率 < 25%
    wear_win_rate_max: 0.25           # 规则③：长窗口胜率阈值
    wear_min_loss_pct: 0.05           # 规则③：亏损总额 > 初始资金 × 此值
